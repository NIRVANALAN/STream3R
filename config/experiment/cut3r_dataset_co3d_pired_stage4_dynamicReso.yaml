# @package _global_
defaults:
  - cut3r_dataset_debug

# num_views: 12 # ! following cut3r training
# num_views: 10 # ! following cut3r training
num_views: 4 # ! following cut3r training
# num_views: 2 # pre-training stage

fixed_length: False

num_test_views: ${num_views}


data_loader:
  train:
    batch_size: 4 # 
    # batch_size: 2 # 
    # batch_size: 12 # 
    # batch_size: 16 # ! for using more datasets
    # batch_size: 32 # 71GB

  val:
    num_workers: 0
    batch_size: 1 #

trainer:
  max_steps: 300000 
  precision: bf16-mixed
  accumulate_grad_batches: 1
  val_check_interval: 2500 # much slower now


checkpointing:
  every_n_train_steps: 2500 #

optimizer:
  lr: 1e-5 # ! following stereo4D, make lr smaller
  warm_up_steps: 1250
  # backbone_lr_multiplier: 0.4 # 1e-5 for backbone update.
  backbone_lr_multiplier: 0.1 # 1e-6 for backbone update.



