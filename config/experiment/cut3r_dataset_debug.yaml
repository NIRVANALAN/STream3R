# @package _global_

# num_views: 4
num_views: 2 # pre-training stage
num_test_views: ${num_views}

defaults:
  - re10k_dl3dv_ar_causal_v1

model:
  encoder:
    backbone:
      # name: croco_multi_rw_ar_causal_v1.5_frame0Mem # ! update the dict in src/model/encoder/backbone/backbone_croco.py:62
      
      # ! if must3r architecture
      name: must3r_reimpl # ! update the dict in src/model/encoder/backbone/backbone_croco.py:62
      asymmetry_decoder: false # no self.dec_blocks 2

# dataset:
#   re10k: # ! object-centric. how?
#     view_sampler:
#       # num_context_views: ${num_views}
#       num_context_views: 4

  # dl3dv: # ! object-centric. how?
  #   view_sampler:
  #     # num_context_views: ${num_views}
  #     num_context_views: 4

data_loader:
  train:
    batch_size: 4 

  val:
    num_workers: 0
    batch_size: 1 #

checkpointing:
  every_n_train_steps: 250 # for easier test


optimizer:
  # lr: 2e-4
  lr: 1e-4 # ! if overfitting
  warm_up_steps: 125
  backbone_lr_multiplier: 0.1


trainer:
  max_steps: 2500 # bs=2
  precision: bf16-mixed
  accumulate_grad_batches: 1
  val_check_interval: 500


allow_repeat: True
n_corres_train: 0
n_corres_test: 0

# resolution: "[(256, 256), (512, 384), (512, 336), (512, 288), (512, 256), (512, 208), (512, 144), (384, 512), (336, 512), (288, 512), (256, 512)]"
resolution: "[(224, 224), (256, 256), (512, 384), (512, 336), (512, 288), (512, 256), (512, 208), (512, 144), (384, 512), (336, 512), (288, 512), (256, 512)]"

resolution_stage1: 256

dataset_root_cpfs: '/cpfs04/shared/landmark_3dgen/lvzhaoyang_group/yslan/cut3r_processed/' 
