# @package _global_

defaults:
  - re10k_dl3dv_ar_causal_v1
  # - /dataset@_group_.dl3dv: dl3dv # fine-tune with two datasets

model:
  encoder:
    backbone:
      name: must3r_reimpl # ! update the dict in src/model/encoder/backbone/backbone_croco.py:62
      asymmetry_decoder: false # no self.dec_blocks 2

dataset:
  re10k: # ! object-centric. how?
    view_sampler:
      # num_context_views: 8
      # num_context_views: 9
      # ! if ctx-views == 2:

      num_context_views: 2 # ! verify why fails
      min_distance_between_context_views: 45 # from 45
      max_distance_between_context_views: 90 # from 90
      min_distance_to_context_views: 1
      initial_min_distance_between_context_views: 25 # from 25
      initial_max_distance_between_context_views: 25

  # dl3dv: # ! object-centric. how?
  #   view_sampler:
  #     num_context_views: 2
  #     # num_context_views: 8
  #     # num_context_views: 9

