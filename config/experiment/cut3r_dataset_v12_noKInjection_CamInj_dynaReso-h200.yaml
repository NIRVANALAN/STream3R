# ! 23 datasets all used here. All except for dl3dv.
# train_dataset: 44800 @ ${dataset0}
train_dataset: 44800 @ ${dataset0} + 56000 @ ${dataset2} + 56000 @ ${dataset3} + 22400
  @ ${dataset4} + 70000 @ ${dataset6} + 33600 @ ${dataset7} + 12000 @ ${dataset33}
  + 22400 @ ${dataset9} + 84000 @ ${dataset10} + 56000 @ ${dataset11} + 9600 @ ${dataset18}
  + 5600 @ ${dataset12} + 168 @ ${dataset13} + 56000 @ ${dataset14} + 16000 @ ${dataset28}
  + 2400 @ ${dataset22} + 600 @ ${dataset23} + 36000 @ ${dataset26} + 9400 @ ${dataset27} 
  + 1400 @ ${dataset29} + 7200 @ ${dataset30} + 28800 @ ${dataset32} + 44800 @ ${dataset8}
  + 19200 @ ${dataset17} + 480 @ ${dataset16} + 16800 @ ${dataset5}

