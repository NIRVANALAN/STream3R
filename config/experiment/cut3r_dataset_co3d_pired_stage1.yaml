# @package _global_
defaults:
  - cut3r_dataset_debug

# num_views: 10
num_views: 4
# num_views: 2 # pre-training stage
num_test_views: ${num_views}


data_loader:
  train:
    batch_size: 8 # 23gib vram. faster data loading
    # batch_size: 12 # 
    # batch_size: 16 # ! for using more datasets
    # batch_size: 32 # 71GB

  val:
    num_workers: 0
    batch_size: 1 #

trainer:
  max_steps: 75000 
  precision: bf16-mixed
  accumulate_grad_batches: 1
  val_check_interval: 5000


checkpointing:
  every_n_train_steps: 5000 #

optimizer:
  # lr: 1e-4 # 
  lr: 5e-5 # ! following stereo4D, make lr smaller
  warm_up_steps: 125
  backbone_lr_multiplier: 0.1

# ! if not injecting K
model:
  encoder:
    backbone:
      name: must3r_reimpl # ! update the dict in src/model/encoder/backbone/backbone_croco.py:62
      asymmetry_decoder: false # no self.dec_blocks 2
      intrinsics_embed_loc: "none"
      # intrinsics_embed_degree: 0
      intrinsics_embed_type: "none"


