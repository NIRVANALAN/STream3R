# @package _global_
defaults:
  # - cut3r_dataset_debug
  - cut3r_dataset_co3d_pired_stage3_noKInjection
  # - dyna_resolution_dataset # include all dust3r datasets

num_views: 4 # ! faster pre-training
# num_views: 8 # ! 4 -> 4
# num_views: 6 # ! 4 -> 4
# num_views: 10 # ! faster pre-training

fixed_length: True # ! play with 4 input views for now
allow_repeat: False


dataset_root: "../../../cut3r_data" # ! reuse previous pkl file

data_loader:
  train:
    # batch_size: 6 # 
    # batch_size: 4
    # batch_size: 16
    # batch_size: 32
    batch_size: 8
    # batch_size: 2 # ! must be larget than 1
    # batch_size: 1


checkpointing:
  every_n_train_steps: 5000 #
  save_top_k: 4

optimizer:
  lr: 2.5e-5 # vggt, 2e-4. stereo4D, 2.5e-5
  # backbone_lr_multiplier: 0.25
  # lr: 5e-5 # vggt, 2e-4. stereo4D, 2.5e-5
  # backbone_lr_multiplier: 0.2
  # lr: 1e-4 # vggt, 2e-4. stereo4D, 2.5e-5
  backbone_lr_multiplier: 0.1
  # backbone_lr_multiplier: 0.2
  # backbone_lr_multiplier: 0.0


# ! enable two new predictions. others remain the same? Add another two datasets.
model:
  encoder:
    # # has_depth_head: True
    # has_depth_head: False
    has_self_pts_head: True
    backbone: # ! noposplat K injection
      # enable_camera_token: False # predict camera
      enable_camera_token: True # predict camera
      intrinsics_embed_loc: 'encoder'
      intrinsics_embed_degree: 4
      intrinsics_embed_type: 'token'




