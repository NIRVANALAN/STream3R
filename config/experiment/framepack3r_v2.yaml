# @package _global_
defaults:
  # - cut3r_dataset_debug
  - cut3r_dataset_v12_noKInjection_CamInj_dynaReso-h200-tuneRatio

# num_views: 4 # ! faster pre-training
# num_views: 7 # 
num_views: 10 # 

num_test_views: ${num_views}
fixed_length: False # as in https://github.com/CUT3R/CUT3R/blob/main/config/stage3.yaml
# fixed_length: True # as in https://github.com/CUT3R/CUT3R/blob/main/config/stage3.yaml

# 

trainer:
  max_steps: 1000000 # 1M steps
  val_check_interval: 10000
  # val_check_interval: 1

data_loader:
  train:
    # batch_size: 6 # 63 gib, then oom
    # batch_size: 8 # ! 100gb, view=4
    # batch_size: 10 # ! 90gib for h200. encoder unfrozen.
    # batch_size: 12 # ! 90gib for h200. encoder unfrozen.
    # batch_size: 14 # ! 90gib for h200. encoder unfrozen.
    # batch_size: 16 # ! 90gib for h200. encoder unfrozen.
    # batch_size: 3 # ! 135 gib, for v=12
    batch_size: 4 # ! for v=10
    # batch_size: 5 # 133gib memory, works well.
  test:
    batch_size: 1
  val:
    batch_size: 1


# ! enable two new predictions. others remain the same? Add another two datasets.
model:
  encoder:
    backbone:
      name: FramePack3Rv2 # ! update the dict in src/model/encoder/backbone/backbone_croco.py:62
  
# dataset_root: "/mnt/yslan-data/cut3r_processed"
dataset_root: "../../../cut3r_data" # ! reuse previous pkl file


# ! for debug
# train_dataset: 44800 @ ${dataset0} + 74000 @ ${dataset15}
# train_dataset: 11200 @ ${dataset7}

optimizer:
  # lr: 2.5e-5 # vggt, 2e-4. stereo4D, 2.5e-5
  # backbone_lr_multiplier: 0.25
  # lr: 5e-5 # vggt, 2e-4. stereo4D, 2.5e-5
  # backbone_lr_multiplier: 0.2

  lr: 2.5e-5 # vggt, 2e-4. stereo4D, 2.5e-5
  backbone_lr_multiplier: 0.1

enable_joint_render_and_3d_sup: False